services:
  workflow-runner:
    build:
      context: ..
      dockerfile: docker/workflow-runner/Dockerfile
    image: ai-dev-workflow-runner:local
    container_name: ai-dev-workflow-runner
    working_dir: /workspace
    tty: true
    stdin_open: true
    volumes:
      - ../:/workspace
      - ../.runtime/logs:/workspace/.runtime/logs
    environment:
      TZ: Asia/Tokyo
      STAGE: all
